<!DOCTYPE html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Opencode Chat</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #111; color: #eee; height: 100vh; display: flex; flex-direction: column; }
header { background: #1a1a2e; padding: 12px 20px; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 12px; }
header h1 { font-size: 18px; color: #7c3aed; }
#status { font-size: 12px; padding: 4px 10px; border-radius: 4px; background: #222; }
#status.online { color: #22c55e; }
#status.offline { color: #ef4444; }
#status.waiting { color: #f59e0b; }
#chat { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
.msg { max-width: 85%; padding: 10px 14px; border-radius: 8px; line-height: 1.5; font-size: 14px; white-space: pre-wrap; }
.msg.user { background: #1e3a5f; align-self: flex-end; }
.msg.assistant { background: #1a1a2e; align-self: flex-start; border: 1px solid #333; }
.msg.tool { background: #1a2e1a; align-self: flex-start; border: 1px solid #2a4a2a; font-size: 12px; font-family: monospace; color: #86efac; }
.msg.reasoning { background: #2e1a1a; align-self: flex-start; border: 1px solid #4a2a2a; font-size: 12px; font-style: italic; color: #fca5a5; }
.msg .label { font-size: 10px; text-transform: uppercase; opacity: .5; margin-bottom: 4px; }
.msg .tool-name { color: #7c3aed; font-weight: bold; }
#input-area { display: flex; gap: 8px; padding: 12px 20px; border-top: 1px solid #333; background: #1a1a2e; }
#input { flex: 1; padding: 10px 14px; border: 1px solid #333; border-radius: 6px; background: #222; color: #eee; font-size: 14px; outline: none; }
#input:focus { border-color: #7c3aed; }
#send { padding: 10px 20px; border: none; border-radius: 6px; background: #7c3aed; color: #fff; font-size: 14px; cursor: pointer; }
#send:hover { background: #6d28d9; }
#send:disabled { opacity: .5; cursor: default; }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #7c3aed; border-top-color: transparent; border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>

<header>
  <h1>Opencode</h1>
  <span id="status" class="offline">offline</span>
</header>

<div id="chat"></div>

<div id="input-area">
  <input id="input" type="text" placeholder="Type a message..." disabled autofocus>
  <button id="send" disabled>Send</button>
</div>

<script>
const STATUS = document.getElementById('status');
const CHAT = document.getElementById('chat');
const INPUT = document.getElementById('input');
const SEND = document.getElementById('send');

let sessionId = null;
let loading = false;
let eventSource = null;
let streamMsgEl = null;

function setStatus(text, cls) {
  STATUS.textContent = text;
  STATUS.className = cls;
}

function addMessage(role, text, extra) {
  const el = document.createElement('div');
  el.className = 'msg ' + role;
  if (role === 'tool') {
    el.innerHTML = '<div class="label">Tool: <span class="tool-name">' + escapeHtml(extra?.toolName || '') + '</span></div>' + escapeHtml(text);
  } else if (role === 'reasoning') {
    el.innerHTML = '<div class="label">Reasoning</div>' + escapeHtml(text);
  } else {
    el.textContent = text;
  }
  CHAT.appendChild(el);
  CHAT.scrollTop = CHAT.scrollHeight;
  return el;
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function api(method, path, body) {
  const opts = { method };
  if (body) {
    opts.headers = { 'Content-Type': 'application/json' };
    opts.body = JSON.stringify(body);
  }
  const r = await fetch(path, opts);
  if (!r.ok) {
    const err = await r.text();
    throw new Error(r.status + ' ' + err.slice(0, 200));
  }
  const ct = r.headers.get('content-type') || '';
  if (ct.includes('json')) return r.json();
  return r.text();
}

async function init() {
  setStatus('connecting...', 'waiting');
  try {
    const health = await api('GET', '/global/health');
    setStatus('online (' + (health.version || '?') + ')', 'online');
    return true;
  } catch (e) {
    setStatus('offline', 'offline');
    return false;
  }
}

async function createSession() {
  const s = await api('POST', '/session', { agent: 'build' });
  sessionId = s.id;
  subscribeEvents();
  INPUT.disabled = false;
  SEND.disabled = false;
  INPUT.focus();
  addMessage('assistant', 'Session started. How can I help you?');
}

function subscribeEvents() {
  if (eventSource) eventSource.close();
  eventSource = new EventSource('/event');
  eventSource.onmessage = (e) => {
    try {
      const evt = JSON.parse(e.data);
      const props = evt.properties || {};
      if (props.sessionID && props.sessionID !== sessionId) return;

      if (evt.type === 'message.part.delta' && props.field === 'text' && props.delta) {
        if (!streamMsgEl) {
          streamMsgEl = addMessage('assistant', '');
        }
        streamMsgEl.textContent += props.delta;
        CHAT.scrollTop = CHAT.scrollHeight;
      }

      if (evt.type === 'message.part.updated') {
        const part = props.part || {};
        if (part.type === 'text' && part.text) {
          if (!streamMsgEl) {
            streamMsgEl = addMessage('assistant', part.text);
          } else {
            streamMsgEl.textContent = part.text;
          }
          CHAT.scrollTop = CHAT.scrollHeight;
        }
      }

      if (evt.type === 'session.status' || evt.type === 'session.idle') {
        streamMsgEl = null;
        loading = false;
        SEND.disabled = false;
        INPUT.disabled = false;
        INPUT.focus();
      }
    } catch (err) {
      // ignore parse errors
    }
  };
}

async function sendMessage(text) {
  if (loading || !sessionId) return;
  loading = true;
  SEND.disabled = true;
  INPUT.disabled = true;
  streamMsgEl = null;
  addMessage('user', text);

  try {
    await api('POST', '/session/' + sessionId + '/message', {
      parts: [{ type: 'text', text }],
      model: { providerID: 'opencode', modelID: 'big-pickle' }
    });
  } catch (e) {
    addMessage('assistant', 'Error: ' + e.message);
    loading = false;
    SEND.disabled = false;
    INPUT.disabled = false;
  }
}

SEND.addEventListener('click', () => {
  const text = INPUT.value.trim();
  if (!text) return;
  INPUT.value = '';
  sendMessage(text);
});

INPUT.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') SEND.click();
});

(async () => {
  if (await init()) {
    await createSession();
  }
})();
</script>
